<!DOCTYPE html>
<!-- Dashboard (INNER, secret). Rendered + encrypted by build.py; gate does document.write() of this whole file after decryption. Never published in plaintext. -->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preventa ASICS S1-27</title>
<style>
  :root{ --navy:#0b2c6f; --blue:#1763b6; --ink:#1a1f2b; --muted:#6b7686; --line:#e7ebf1; --bg:#f4f6fa; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); }
  .hdr{ background:linear-gradient(110deg,var(--navy),var(--blue)); color:#fff; }
  .hdr-in{ max-width:1080px; margin:0 auto; padding:22px 20px; }
  .hdr h1{ margin:0; font-size:26px; letter-spacing:.5px; font-weight:800; }
  .hdr h1 span{ color:#ffd34d; }
  .sub{ margin:4px 0 0; opacity:.85; font-size:14px; }
  .wrap{ max-width:1080px; margin:0 auto; padding:20px; }
  .controls{ display:flex; flex-wrap:wrap; gap:22px; margin-bottom:18px; }
  .ctl-lbl{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:7px; }
  .btns{ display:inline-flex; background:#fff; border:1px solid var(--line); border-radius:10px; padding:4px; gap:4px; }
  .btns button{ border:0; background:transparent; padding:9px 16px; border-radius:7px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; transition:.15s; }
  .btns button:hover{ color:var(--ink); }
  .btns button.on{ background:var(--blue); color:#fff; box-shadow:0 1px 3px rgba(11,44,111,.3); }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:18px; box-shadow:0 1px 2px rgba(20,30,60,.04); }
  .card-head{ display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:6px; }
  .card-head h2{ margin:0; font-size:18px; }
  .total{ font-size:14px; color:var(--muted); }
  .total b{ font-size:20px; color:var(--navy); }
  .chart-box{ position:relative; height:380px; }
  table{ width:100%; border-collapse:collapse; font-size:14px; }
  th,td{ padding:9px 8px; border-bottom:1px solid var(--line); }
  th{ font-size:12px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:600; }
  .l{ text-align:left; } .r{ text-align:right; font-variant-numeric:tabular-nums; }
  tfoot td{ font-weight:700; border-bottom:0; border-top:2px solid var(--line); }
  .dot{ display:inline-block; width:11px; height:11px; border-radius:3px; }
  .ft{ text-align:center; color:var(--muted); font-size:12px; padding:10px 0 30px; }
  @media(max-width:560px){ .chart-box{ height:320px; } .hdr h1{ font-size:22px; } }
</style>
</head>
<body>
  <header class="hdr">
    <div class="hdr-in">
      <h1>Preventa ASICS <span>S1-27</span></h1>
      <p class="sub">Preline footwear order &middot; unidades</p>
    </div>
  </header>

  <main class="wrap">
    <section class="controls">
      <div class="ctl">
        <span class="ctl-lbl">Cantidad</span>
        <div class="btns" id="qtyBtns">
          <button data-qty="compra" class="on">Compra</button>
          <button data-qty="extra">Extra</button>
          <button data-qty="cancel">Cancel</button>
        </div>
      </div>
      <div class="ctl">
        <span class="ctl-lbl">Ver por</span>
        <div class="btns" id="dimBtns">
          <button data-dim="gender" class="on">Género</button>
          <button data-dim="categoria">Categoría</button>
          <button data-dim="modelo">Modelo</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2 id="chartTitle">Por género</h2>
        <div class="total">Total <b id="totalVal">0</b> <span>unidades</span></div>
      </div>
      <div class="chart-box"><canvas id="pie"></canvas></div>
    </section>

    <section class="card">
      <table id="tbl">
        <thead>
          <tr><th>&nbsp;</th><th class="l" id="thLabel">Categoría</th><th class="r">Unidades</th><th class="r">%</th></tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr><td></td><td class="l">Total</td><td class="r" id="tfVal">0</td><td class="r">100%</td></tr>
        </tfoot>
      </table>
    </section>

    <footer class="ft">Preventa ASICS S1-27 &middot; datos confidenciales</footer>
  </main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
/* ---- data injected at build time ---- */
const RECORDS = /*__DATA_JSON__*/[]/*__END_DATA__*/;
const HAS_CAT = /*__HAS_CAT__*/true/*__END_HAS_CAT__*/;

// hide the Categoría button if the source has no category column
if(!HAS_CAT){
  const b = document.querySelector('#dimBtns button[data-dim="categoria"]');
  if(b) b.remove();
}

const DIM = { gender:"Género", categoria:"Categoría", modelo:"Modelo" };
const TOP_N = 12; // collapse the long Modelo tail into "Otros" so the pie stays readable
let state = { qty:"compra", dim:"gender" };
let chart = null;
const fmt = n => n.toLocaleString("es-MX");

function group(records, dimKey, qtyKey){
  const m = new Map();
  for(const r of records){
    const k = r[dimKey] || "—";
    m.set(k, (m.get(k)||0) + (r[qtyKey]||0));
  }
  let rows = [...m.entries()].map(([label,value])=>({label,value}))
              .filter(r=>r.value>0).sort((a,b)=>b.value-a.value);
  const total = rows.reduce((s,r)=>s+r.value,0);
  rows.forEach(r=> r.pct = total? r.value/total*100 : 0);
  return { rows, total };
}

const BASE = ["#0b2c6f","#1763b6","#39a0ed","#e4002b","#f5a623","#16a085",
              "#8e44ad","#2c3e50","#e67e22","#27ae60","#c0392b","#5d6d7e"];
const colorFor = i => i<BASE.length ? BASE[i] : `hsl(${(i*47)%360} 60% 50%)`;

function pieData(rows, total){
  if(state.dim==="modelo" && rows.length>TOP_N){
    const head = rows.slice(0,TOP_N), tail = rows.slice(TOP_N);
    const otros = tail.reduce((s,r)=>s+r.value,0);
    return [...head, {label:`Otros (${tail.length})`, value:otros, pct: total?otros/total*100:0}];
  }
  return rows;
}

function render(){
  const { rows, total } = group(RECORDS, state.dim, state.qty);
  const disp = pieData(rows, total);
  document.getElementById("chartTitle").textContent = "Por " + DIM[state.dim].toLowerCase();
  document.getElementById("thLabel").textContent = DIM[state.dim];
  document.getElementById("totalVal").textContent = fmt(total);
  document.getElementById("tfVal").textContent = fmt(total);

  const labels = disp.map(r=>r.label), values = disp.map(r=>r.value), colors = disp.map((_,i)=>colorFor(i));
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("pie"), {
    type:"pie",
    data:{ labels, datasets:[{ data:values, backgroundColor:colors, borderColor:"#fff", borderWidth:2 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position:"right", labels:{ boxWidth:14, padding:9, font:{size:12} } },
        tooltip:{ callbacks:{ label:c=>{ const v=c.parsed, p=total?v/total*100:0; return ` ${c.label}: ${fmt(v)} (${p.toFixed(1)}%)`; } } }
      }
    }
  });

  document.querySelector("#tbl tbody").innerHTML = rows.map((r,i)=>`
    <tr><td><span class="dot" style="background:${colorFor(i)}"></span></td>
    <td class="l">${r.label}</td><td class="r">${fmt(r.value)}</td><td class="r">${r.pct.toFixed(1)}%</td></tr>`).join("");
}

function wire(groupId, key, attr){
  document.querySelectorAll(`#${groupId} button`).forEach(b=>{
    b.addEventListener("click", ()=>{
      document.querySelectorAll(`#${groupId} button`).forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      state[key] = b.dataset[attr];
      render();
    });
  });
}
wire("qtyBtns","qty","qty");
wire("dimBtns","dim","dim");
render();
</script>
</body>
</html>
